<div class="contenedor-app">
  <header class="mi-header">
    <h1>Enviar Reporte</h1>
  </header>
  
  <main class="contenido">
    <form id="formulario-contacto">
      <label>Tu Nombre:</label>
      <input type="text" id="campo-nombre" placeholder="Ej: Juan Pérez" required>
      
      <label>Describe la situación:</label>
      <textarea id="campo-mensaje" placeholder="Escribe aquí tu reporte..." required></textarea>
      
      <button type="submit" class="boton-app">ENVIAR AHORA</button>
    </form>
  </main>
</div>

<script src="script.js"></script>
